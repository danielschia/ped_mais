default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch('RAILS_MAX_THREADS') { 5 } %>
  host: db
  username: postgres
  password: password

development:
  <<: *default
  database: ped_mais_development

test:
  <<: *default
  database: ped_mais_test

production:
  <<: *default
  database: ped_mais_production
  username: ped_mais
  password: <%= ENV['PED_MAIS_DATABASE_PASSWORD'] %>
